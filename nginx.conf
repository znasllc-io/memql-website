# Hide version + reduce response footprint
server_tokens off;

# Server-wide defaults for a static marketing site — no uploads, no API
client_max_body_size 16k;
client_body_timeout  10s;
client_header_timeout 10s;
send_timeout         10s;

server {
  listen       ${PORT};
  server_name  _;

  root  /usr/share/nginx/html;
  index index.html;

  # Block dotfiles (defense-in-depth — `out/` shouldn't ship any, but)
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Next static-export path resolution: try the literal path, then .html,
  # then a directory index. Unknown paths 404 honestly (not soft-200 to
  # index.html — that's bad for SEO and link-rot debugging).
  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  # Serve next export's prebuilt 404.html with a real 404 status code
  error_page 404 /404.html;

  # Build artifacts under /_next/static are content-hashed → cache forever
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }

  # HTML — never cached, so new deploys take effect immediately
  location ~* \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # Cloud Run / uptime check endpoint
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # gzip everything reasonable
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # ─── Security headers ───────────────────────────────────────────────
  # Applied to every response.

  # Clickjacking + MIME-sniffing + referrer + Permissions Policy
  add_header X-Frame-Options         "DENY"                                       always;
  add_header X-Content-Type-Options  "nosniff"                                    always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin"            always;
  add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()"   always;

  # HTTPS-only enforcement. Cloud Run terminates TLS; this header tells
  # browsers to upgrade future requests to HTTPS for two years and
  # qualifies us for the HSTS preload list once we submit.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # Cross-Origin isolation. We don't embed anything cross-origin and
  # don't want to be embedded.
  add_header Cross-Origin-Opener-Policy   "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;

  # Content-Security-Policy in REPORT-ONLY mode first. Violations show
  # up in the browser console / report endpoint without breaking the
  # page. Promote to the enforcing `Content-Security-Policy` header
  # after ~1–2 weeks of clean observation in production.
  #
  # Allowlisted origins (audit of the codebase):
  #   - fonts.googleapis.com, fonts.gstatic.com → next/font/google
  #     emits these for Source Serif 4 + JetBrains Mono.
  # 'unsafe-inline' on style-src is unavoidable with static export —
  # Next.js inlines critical CSS at build with no nonce mechanism.
  add_header Content-Security-Policy-Report-Only
    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-src 'none'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    always;
}
