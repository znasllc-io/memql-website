server {
  listen       ${PORT};
  server_name  _;

  root  /usr/share/nginx/html;
  index index.html;

  # Next static-export path resolution: try the literal path, then .html,
  # then a directory index. Fall back to /index.html so client-side
  # routing doesn't 404 on direct hits to nested paths.
  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }

  # Build artifacts under /_next/static are content-hashed → cache forever
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # HTML — never cached, so new deploys take effect immediately
  location ~* \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Cloud Run / uptime check endpoint
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # gzip everything reasonable
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Security headers — applied to every response
  add_header X-Frame-Options         "DENY"                                  always;
  add_header X-Content-Type-Options  "nosniff"                               always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin"       always;
  add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
}
