name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

# Edit these to match your GCP setup before the first push.
env:
  PROJECT_ID: memql-website   # GCP project ID
  REGION:     us-central1
  REPOSITORY: memql-website   # Artifact Registry repository
  SERVICE:    memql-website   # Cloud Run service name

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents:  read
      id-token:  write          # only needed if you switch to Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Auth via a service-account JSON key stored as a repo secret.
      # To set up: create a service account in GCP with these roles —
      #   • Cloud Run Admin
      #   • Artifact Registry Writer
      #   • IAM Service Account User
      # Download a JSON key, then add it as a repo secret named GCP_SA_KEY.
      # (For a more secure setup, swap to Workload Identity Federation
      #  with google-github-actions/auth@v2 + workload_identity_provider.)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push  "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image            "${{ steps.build.outputs.image }}" \
            --project          "${PROJECT_ID}" \
            --region           "${REGION}" \
            --platform         managed \
            --port             8080 \
            --memory           256Mi \
            --cpu              1 \
            --min-instances    0 \
            --max-instances    3 \
            --allow-unauthenticated \
            --quiet
