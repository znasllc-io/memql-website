name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

# Edit these to match your GCP setup before the first push.
env:
  PROJECT_ID: memql-website   # GCP project ID
  REGION:     us-central1
  REPOSITORY: memql-website   # Artifact Registry repository
  SERVICE:    memql-website   # Cloud Run service name

# Minimum-needed scopes. `id-token: write` is only needed if you migrate
# to Workload Identity Federation (recommended — see auth step below).
permissions:
  contents:  read
  id-token:  write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Pinned to a commit SHA — supply-chain hygiene. The "# v4.x.y"
      # comment is human-readable; the SHA is what actually runs.
      # Update the SHA + version comment when bumping the action.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Run a quick CVE audit before we bake anything into an image.
      # `high` threshold so noisy moderate findings don't block deploys;
      # tighten to `moderate` later.
      - name: npm audit (production deps, high+ only)
        run: |
          npm ci --no-audit --no-fund
          npm audit --omit=dev --audit-level=high || {
            echo "::warning::npm audit found high-severity issues in production deps"
            exit 1
          }

      # Auth via a service-account JSON key stored as a repo secret.
      # To set up: create a service account in GCP with these roles —
      #   • Cloud Run Admin
      #   • Artifact Registry Writer
      #   • IAM Service Account User
      # Download a JSON key, then add it as a repo secret named GCP_SA_KEY.
      #
      # MIGRATION TO WORKLOAD IDENTITY FEDERATION (recommended):
      #   1. Create a WIF pool + provider trusting this repo's OIDC.
      #   2. Bind the deployer SA to the pool with workloadIdentityUser.
      #   3. Replace `credentials_json: ${{ secrets.GCP_SA_KEY }}` below with:
      #        workload_identity_provider: projects/N/locations/global/workloadIdentityPools/gh/providers/gh
      #        service_account:            deployer@memql-website.iam.gserviceaccount.com
      #   4. Delete the long-lived JSON key and remove the GCP_SA_KEY secret.
      # The `id-token: write` permission above is already granted to support this.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push  "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      # TODO: enable a dedicated, minimum-permission runtime SA instead
      # of the default Compute Engine SA. Setup (~30s of gcloud), then
      # uncomment the --service-account line below:
      #
      #   gcloud iam service-accounts create memql-runtime \
      #       --project memql-website
      #
      #   gcloud iam service-accounts add-iam-policy-binding \
      #       memql-runtime@memql-website.iam.gserviceaccount.com \
      #       --member="serviceAccount:github-actions-deploy@memql-website.iam.gserviceaccount.com" \
      #       --role="roles/iam.serviceAccountUser" \
      #       --project=memql-website
      #
      # The runtime SA needs NO role bindings — this is a static site
      # that calls zero GCP APIs.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image            "${{ steps.build.outputs.image }}" \
            --project          "${PROJECT_ID}" \
            --region           "${REGION}" \
            --platform         managed \
            --port             8080 \
            --memory           256Mi \
            --cpu              1 \
            --min-instances    0 \
            --max-instances    10 \
            --ingress          all \
            --allow-unauthenticated \
            --quiet
          # Uncomment once memql-runtime SA exists (see TODO above):
          #   --service-account "memql-runtime@${PROJECT_ID}.iam.gserviceaccount.com" \
